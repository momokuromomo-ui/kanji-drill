.header {

}
.header h1 { color:white; font-size:20px; font-weight:900; letter-spacing:3px; }
.back-btn {
  background: rgba(255,255,255,0.2); border: none; border-radius: 8px;

}
.container { max-width:640px; margin:0 auto; padding:24px 16px; padding-bottom:40px; }

@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes popIn  { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes spin   { to{transform:rotate(360deg)} }
.slide-up { animation: slideUp 0.3s ease; }
.pop-in   { animation: popIn 0.3s ease; }

.card {
  background: white; border-radius: 18px; padding: 18px 20px;
  margin-bottom: 12px; box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  border: 2px solid #f0e6d3;
}
.btn-red {
  width:100%; padding:17px; border-radius:16px; border:none;
  background: linear-gradient(135deg,#c1121f,#780000);
  color:white; font-weight:900; font-size:17px; cursor:pointer;
  box-shadow: 0 4px 18px rgba(193,18,31,0.3);
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin-bottom:10px;
}
.btn-ghost {
  width:100%; padding:13px; border-radius:14px;
  border: 2px solid #f0e6d3; background:white;
  color:#78716c; font-weight:700; font-size:15px; cursor:pointer;
}
@keyframes animalGlow {
  from { filter:drop-shadow(0 0 6px #fbbf24); transform:scale(1); }
  to   { filter:drop-shadow(0 0 18px #f59e0b); transform:scale(1.12); }
}
@keyframes animalPop {
  0%   { transform:scale(0.3) rotate(-15deg); opacity:0; }
  70%  { transform:scale(1.2) rotate(5deg); }
  100% { transform:scale(1) rotate(0); opacity:1; }
}
.session-row {
  background:white; border:2px solid #f0e6d3; border-radius:18px;
  padding:16px 20px; margin-bottom:12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.session-row:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(193,18,31,0.1); }
.level-btn {
  width:100%; background:white; border-radius:18px; padding:16px 20px;
  margin-bottom:12px; cursor:pointer; border:none;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
  transition:transform 0.15s, box-shadow 0.15s;

.q-card {
  background:white; border-radius:18px; padding:18px 20px 16px;
  margin-bottom:14px; box-shadow:0 2px 16px rgba(0,0,0,0.07);

.q-card.correct { border:2.5px solid #16a34a; }
.q-card.wrong   { border:2.5px solid #dc2626; }
.q-card.shown   { border:2px solid #f59e0b; }
.result-banner {
  background: linear-gradient(135deg,#1e1b4b,#312e81);
  border-radius:20px; padding:28px 24px; text-align:center;

canvas { touch-action: none; }

function save(sessions) {
  try { LS.setItem(SK, JSON.stringify(sessions)); } catch(e){}
}
function load() {
  try {
    var saved = JSON.parse(LS.getItem(SK)||"[]");
    var base = JSON.parse(JSON.stringify(BUILTIN));
    if (Array.isArray(saved)) {
      saved.forEach(function(s) {
        if (s && s.id && !base.find(function(b) { return b.id === s.id; })) base.push(s);
      });
    }
    base.sort(function(a,b) { return (a.id||0) - (b.id||0); });
    return base.length > 0 ? base : JSON.parse(JSON.stringify(BUILTIN));
  } catch(e) {
    return JSON.parse(JSON.stringify(BUILTIN));
  }
}

var HK = "kanji_history_v1";

function loadHistory() {
  try { return JSON.parse(LS.getItem(HK)||"[]"); } catch { return []; }
}
function saveHistory(h) {
  try { LS.setItem(HK, JSON.stringify(h)); } catch(e){}
}
function addHistory(record) {
  var h = loadHistory();
  h.unshift(record);
  if (h.length > 200) h.splice(200);
  saveHistory(h);
}

function isClear(sessionTitle, levelTitle) {
  var h = loadHistory();
  var found = false;
  for (var i = 0; i < h.length; i++) {
    var r = h[i];
    if (r.sessionTitle === sessionTitle && r.levelTitle === levelTitle && r.correct / r.total >= 1.0) {
      found = true; break;
    }
  }
  return found;
}

var S = {
  screen: "home",
  sessions: load(),
  active: null,
  level: null,
  ps: null,
};

var app  = document.getElementById("app");
var hdr  = document.getElementById("header");

function go(screen) { S.screen = screen; render(); }

function render() {
  app.innerHTML = "";
  var hb = document.getElementById("hist-btn");
  if (hb) hb.style.display = (S.screen==="practice") ? "none" : "";
  var _bb = hdr.querySelector(".back-btn"); if (_bb) _bb.remove();
  if (S.screen !== "home") {
    var b = document.createElement("button");
    b.className = "back-btn"; b.textContent = "← もどる";
    b.onclick = function() {
      if (S.screen === "practice" && S.level === "shuffle") { S.screen = "shuffleSetup"; S.ps = null; }
      else if (S.screen === "practice") { S.screen = "drill"; S.ps = null; }
      else if (S.screen === "drill") { S.screen = "kanji"; }
      else if (S.screen === "kanji") { S.screen = "home"; S.active = null; }
      else { S.screen = "home"; }
      render();
    };
    hdr.insertBefore(b, hdr.querySelector("h1"));
  }
  var pages = { home: pageHome, add: pageAdd, drill: pageDrill, kanji: pageKanji, practice: pagePractice, history: pageHistory, shuffleSetup: pageShuffleSetup, rankDetail: pageRankDetail };
  if (pages[S.screen]) pages[S.screen]();
}

var SK_SHUFFLE = "kanji_shuffle_v1";

function shuffleKey(key) {
  // key設計:
  //   "all"       → _all   : まとめ+シャッフル合計（段位用）
  //   "shuf"      → _shuf  : シャッフル全体回数
  //   "sum_第1回"  → _m1   : 各回まとめ回数
  //   "su_第1回"   → _su1  : 各回シャッフル利用回数
  if (!key || key === "all")  return SK_SHUFFLE + "_all";
  if (key === "shuf")          return SK_SHUFFLE + "_shuf";
  if (key.indexOf("sum_") === 0) {
    var sm = key.match(/(\d+)/);
    return SK_SHUFFLE + "_m" + (sm ? sm[1] : "0");
  }
  if (key.indexOf("su_") === 0) {
    var su = key.match(/(\d+)/);
    return SK_SHUFFLE + "_su" + (su ? su[1] : "0");
  }
  // 旧キー互換（_s1など）は参照しない
  var m = key.match(/(\d+)/);
  return SK_SHUFFLE + "_s" + (m ? m[1] : key.replace(/[^a-zA-Z0-9]/g, ""));
}

function getShuffleStats(key) {
  // key: "all" or 回タイトル("第1回"など)
  var k = shuffleKey(key);
  var raw = LS.getItem(k);
  if (!raw) return { total: 0, correct: 0, count: 0 };
  try {
    var d = JSON.parse(raw);
    if (!d.count) d.count = 0;
    return d;
  } catch(e) { return { total: 0, correct: 0, count: 0 }; }
}

function saveShuffleStats(key, stats) {
  var k = shuffleKey(key);
  LS.setItem(k, JSON.stringify(stats));
}

function getShuffleRank(count) {
  var rank = SHUFFLE_RANKS[0];
  for (var i = 0; i < SHUFFLE_RANKS.length; i++) {
    if (count >= SHUFFLE_RANKS[i].min) rank = SHUFFLE_RANKS[i];
  }
  return rank;
}

function getNextRank(count) {
  for (var i = 0; i < SHUFFLE_RANKS.length; i++) {
    if (SHUFFLE_RANKS[i].min > count) return SHUFFLE_RANKS[i];
  }
  return null;
}

      if (!selectedSessions[sess.id]) return;
      if (!sess.levels) return;
      usedSessions.push(sess.title);
      sess.levels.forEach(function(lv) {

          pool.push({ sentence: q.sentence, answer: q.answer, from: sess.title + " L" + lv.level });

    if (pool.length === 0) { alert("問題がありません。回とレベルを選んでください。"); return; }

      var j = Math.floor(Math.random() * (i + 1));

      row.style.cssText = `background:white;border-radius:14px;padding:14px 18px;margin-bottom:10px;border:2px solid ${v==="correct"?"#16a34a":"#dc2626"};display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,0.06);`;

      div.appendChild(row);
    });

    var correct = Object.values(ps.verdicts).filter(function(v) { return v==="correct"; }).length;
    var total   = ps.questions.length;
    var msg = correct===total ? "🌟 かんぺき！すごい！" : correct>=total*0.7 ? "⭐ よくできました！" : correct>=total*0.4 ? "💪 もう少し！がんばれ！" : "📖 また れんしゅう しよう！";
    var isClearedNow = S.level !== "summary" && correct === total;
    var allLevelsCleared = (function() {
      if (S.level === "summary") return false;
      var sess = S.active;
      if (!sess) return false;
      var cleared = true;
      LC.forEach(function(lc) {
        if (!isClear(sess.title, lc.title)) cleared = false;
      });
      return cleared;
    })();
    var lc2 = S.level !== "summary" ? LC[S.level-1] : null;

    var banner = el("div","result-banner pop-in"); banner.style.marginTop="8px";
    banner.innerHTML = `
      <div style="color:#a5b4fc;font-size:13px;letter-spacing:2px;margin-bottom:8px;">さいてん けっか</div>

      ${isClearedNow ? `<div style="margin-top:16px;background:rgba(255,255,255,0.15);border-radius:14px;padding:14px 20px;"><div style="font-size:28px;margin-bottom:4px;">🎉</div><div style="font-size:22px;font-weight:900;color:#fde68a;letter-spacing:2px;">レベルクリア！</div><div style="font-size:13px;color:#a5b4fc;margin-top:4px;">${lc2 ? lc2.title : ""} をクリアしました</div></div>` : ""}
      ${allLevelsCleared ? `<div style="margin-top:16px;background:linear-gradient(135deg,#fde68a,#fbbf24);border-radius:18px;padding:20px;text-align:center;"><div style="font-size:48px;margin-bottom:8px;">🏆</div><div style="font-size:26px;font-weight:900;color:#92400e;letter-spacing:2px;">ぜんぶクリア！！</div><div style="font-size:15px;color:#78350f;margin-top:6px;font-weight:700;">すべてのレベルをせいふくしたよ！</div></div>` : ""}`;
    div.appendChild(banner);

    if (allLevelsCleared) { setTimeout(launchFireworks, 300); }

    // シャッフル・まとめ段位
    if (S.level === "shuffle" || S.level === "summary") {
            var rankUps = [];
      var isShuffle = (S.level === "shuffle");
      var isSummary = (S.level === "summary");

      // 全体カウント（まとめ+シャッフル両方）→段位用
      var allOld = getShuffleStats("all");
      var allOldRank = getShuffleRank(allOld.count || 0);
      allOld.count = (allOld.count || 0) + 1;
      allOld.total += total; allOld.correct += correct;
      saveShuffleStats("all", allOld);
      var allNewRank = getShuffleRank(allOld.count);
      var allNext = getNextRank(allOld.count);
      if (allNewRank.label !== allOldRank.label) rankUps.push({ old: allOldRank, next: allNewRank, label: "ぜんたい" });

      if (isShuffle) {
        // シャッフル全体回数
        var shufOld = getShuffleStats("shuf");
        shufOld.count = (shufOld.count || 0) + 1;
        saveShuffleStats("shuf", shufOld);
        // 各回シャッフル利用回数
        var shuffleTitles = S.shuffleSessionTitles || [];
        shuffleTitles.forEach(function(title) {
          var suOld = getShuffleStats("su_" + title);
          suOld.count = (suOld.count || 0) + 1;
          saveShuffleStats("su_" + title, suOld);
        });
      }

function rebuildShuffleStatsFromHistory(history) {
  var allStats  = { count:0, total:0, correct:0 }; // 合計（段位用）
  var shufStats = { count:0 };                       // シャッフル全体回数
  var perSum    = {};                                // 各回まとめ回数
  var perSu     = {};                                // 各回シャッフル利用回数

  history.forEach(function(r) {
    var isShuffle = r.levelTitle === "シャッフル";
    var isSummary = r.levelTitle === "まとめ" || r.levelTitle === "まとめテスト" || r.levelTitle === "summary";

    if (isShuffle || isSummary) {
      allStats.count++;
      allStats.total   += (r.total   || 0);
      allStats.correct += (r.correct || 0);
    }
    if (isShuffle) {
      shufStats.count++;
      if (r.shuffleSessions) {
        r.shuffleSessions.forEach(function(title) {
          if (!perSu[title]) perSu[title] = { count:0 };
          perSu[title].count++;
        });
      }
    }
    if (isSummary && r.sessionTitle) {
      if (!perSum[r.sessionTitle]) perSum[r.sessionTitle] = { count:0, total:0, correct:0 };
      perSum[r.sessionTitle].count++;
      perSum[r.sessionTitle].total   += (r.total   || 0);
      perSum[r.sessionTitle].correct += (r.correct || 0);
    }
  });

  // 全シャッフル関連キーをlocalStorageから完全削除してから保存
  try {
    var keysToDelete = [];
    for (var ki = 0; ki < localStorage.length; ki++) {
      var lk = localStorage.key(ki);
      if (lk && lk.indexOf(SK_SHUFFLE) === 0) keysToDelete.push(lk);
    }
    keysToDelete.forEach(function(lk) { localStorage.removeItem(lk); });
  } catch(e) {}
  // LS._mem も全クリア
  var prefix = SK_SHUFFLE;
  Object.keys(LS._mem).forEach(function(mk) {
    if (mk.indexOf(prefix) === 0) delete LS._mem[mk];
  });

  saveShuffleStats("all",  allStats);
  saveShuffleStats("shuf", shufStats);
  S.sessions.forEach(function(sess) {
    saveShuffleStats("sum_" + sess.title, perSum[sess.title]  || { count:0, total:0, correct:0 });
    saveShuffleStats("su_"  + sess.title, perSu[sess.title]   || { count:0 });
  });
}

function getApiKey() {
  var key = LS.getItem("ai_api_key");
  if (!key) {
    key = prompt("Claude API キーを入力してください\n（sk-ant-... の形式。「設定」ボタンで後から変更できます）");
    if (key) {
      key = key.trim();
      LS.setItem("ai_api_key", key);
    }
  }
  return key;
}
function clearApiKey() { LS.removeItem("ai_api_key"); }

function combineCanvases(dataUrls, size) {
  return new Promise(function(resolve) {
    var n = dataUrls.length;
    if (n === 0) return resolve(null);
    var canvas = document.createElement("canvas");
    canvas.width = n * size;
    canvas.height = size;
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    var loaded = 0;
    dataUrls.forEach(function(url, i) {
      var img = new Image();
      img.onload = function() {
        ctx.drawImage(img, i * size, 0, size, size);
        if (++loaded === n) resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = function() {
        if (++loaded === n) resolve(canvas.toDataURL("image/png"));
      };
      img.src = url;
    });
  });
}

async function callClaudeAPI(imageDataUrl, expected) {
  var apiKey = getApiKey();
  if (!apiKey) throw new Error("APIキーが設定されていません");
  var base64 = imageDataUrl.replace(/^data:image\/png;base64,/, "");
  var promptText =
    "この画像は小学生が手書きした漢字です。「" + expected + "」と読めるか、" +
    "小学校の漢字採点者として判定してください。\n" +
    "判定基準：字形が「" + expected + "」として認識できるか、" +
    "とめ・はね・はらい、画数、バランス。\n" +
    "回答は必ず以下のJSON形式のみで返答してください（前後に説明文を付けない）：\n" +
    "{\"correct\": true または false, \"message\": \"60文字以内の励みになる日本語フィードバック。とめ・はね・はらい等にも触れる\"}";
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 300,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: "image/png", data: base64 } },
          { type: "text", text: promptText }
        ]
      }]
    })
  });
  if (!res.ok) {
    var t = await res.text();
    if (res.status === 401) {
      clearApiKey();
      throw new Error("APIキーが無効です。再度入力してください。");
    }
    throw new Error("API エラー: " + res.status + " " + t.slice(0, 120));
  }
  var data = await res.json();
  var text = data.content[0].text;
  var m = text.match(/\{[\s\S]*?\}/);
  if (!m) throw new Error("AIの応答を解析できませんでした");
  return JSON.parse(m[0]);
}

async function gradeWithAI(question, drawings) {
  var keys = Object.keys(drawings)
    .filter(function(k) { return drawings[k]; })
    .sort(function(a,b) { return parseInt(a) - parseInt(b); });
  var urls = keys.map(function(k) { return drawings[k]; });
  if (urls.length === 0) {
    return { correct: false, message: "まだ何も書かれていません。マスに書いてから採点してください。" };
  }
  var combined = await combineCanvases(urls, 400);
  return await callClaudeAPI(combined, question.answer);
}

    chars.forEach(function(_,ci) {
      var cell = makeCell(200, function(d) { drawn[ci]=d; }, ps.verdicts[qi]||null, !shown && !ps.verdicts[qi], drawn[ci]);
      cellGroup.appendChild(cell);

    if (!shown) {
      var aiBtn = el("button");
      aiBtn.style.cssText=`padding:12px 16px;border-radius:14px;border:none;background:linear-gradient(135deg,#1e40af,#1e3a8a);color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;`;
      aiBtn.textContent="🤖 AIで採点";
      aiBtn.onclick = async function() {
        aiBtn.disabled = true;
        var origText = aiBtn.textContent;
        aiBtn.textContent = "⏳ AI判定中...";
        aiBtn.style.opacity = "0.7";
        try {
          var result = await gradeWithAI(q, drawn);
          ps.verdicts[qi] = result.correct ? "correct" : "wrong";
          ps._aiMessages = ps._aiMessages || {};
          ps._aiMessages[qi] = result.message;
          shown = true;
          updateResWrap(ps);
          rebuild();
        } catch(err) {
          aiBtn.disabled = false;
          aiBtn.textContent = origText;
          aiBtn.style.opacity = "1";
          alert("⚠️ " + err.message);
        }
      };
      ctrl.appendChild(aiBtn);
      var ab = el("button"); ab.id=`ab${qi}`;
      ab.style.cssText=`padding:12px 16px;border-radius:14px;border:none;background:linear-gradient(135deg,#c1121f,#780000);color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;`;
      ab.textContent="📖 こたえをみる"; ab.onclick=function() { shown=true; rebuild(); };
      ctrl.appendChild(ab);
    } else {
      var aw = el("div","pop-in"); aw.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:4px;";
      var ar = el("div"); ar.style.cssText="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;";
      chars.forEach(function(c) {
        var b = el("div");
        b.style.cssText=`width:44px;height:44px;border:2px solid #d4b896;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;background:#fffef5;`;
        b.textContent=c; ar.appendChild(b);
      });
      var lbl=el("div"); lbl.style.cssText="font-size:10px;color:#92400e;font-weight:700;"; lbl.textContent="こたえ";
      aw.appendChild(ar); aw.appendChild(lbl); ctrl.appendChild(aw);
      // AIフィードバック表示
      if (ps._aiMessages && ps._aiMessages[qi]) {
        var fb = el("div");
        var isOk = ps.verdicts[qi] === "correct";
        fb.style.cssText = "background:" + (isOk ? "#dcfce7" : "#fee2e2") + ";border:1.5px solid " + (isOk ? "#16a34a" : "#dc2626") + ";border-radius:10px;padding:8px 10px;font-size:11px;line-height:1.5;color:#1e1e1e;margin-top:4px;";
        fb.innerHTML = "<div style='font-size:9px;font-weight:800;color:" + (isOk ? "#15803d" : "#b91c1c") + ";letter-spacing:1px;margin-bottom:3px;'>🤖 AIコメント</div>" + ps._aiMessages[qi];
        ctrl.appendChild(fb);
      }
      if (!ps.verdicts[qi]) {
        var rewBtn=el("button"); rewBtn.textContent="✏️ もう一度書く";
        rewBtn.style.cssText="padding:8px 10px;border-radius:10px;border:1.5px solid #4338ca;background:#ede9fe;color:#3730a3;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;width:100%;";
        rewBtn.onclick=function() {
          shown=false;
          drawn={};
          rebuild();
        };
        ctrl.appendChild(rewBtn);
      }
      if (!ps.verdicts[qi]) {
        var btns=el("div","pop-in"); btns.style.cssText="display:flex;gap:6px;justify-content:center;";
        var ok=el("button"); ok.textContent="⭕";
        ok.style.cssText=`width:52px;height:52px;border-radius:14px;border:2.5px solid #16a34a;background:white;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;`;
        ok.onmouseenter=function(){ok.style.background="#dcfce7";}; ok.onmouseleave=function(){ok.style.background="white";};
        ok.onclick=function() { ps.verdicts[qi]="correct"; updateResWrap(ps); shown=true; rebuild(); };
        var ng=el("button"); ng.textContent="✕";
        ng.style.cssText=`width:52px;height:52px;border-radius:14px;border:2.5px solid #dc2626;background:white;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;`;
        ng.onmouseenter=function(){ng.style.background="#fee2e2";}; ng.onmouseleave=function(){ng.style.background="white";};
        ng.onclick=function() { ps.verdicts[qi]="wrong"; updateResWrap(ps); shown=true; rebuild(); };
        btns.appendChild(ok); btns.appendChild(ng); ctrl.appendChild(btns);
      }
      if (ps.verdicts[qi]) {
        var u=el("button"); u.textContent="やり直し";
        u.style.cssText=`padding:8px 10px;border-radius:10px;border:1.5px solid #d1d5db;background:white;color:#6b7280;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;`;
        u.onclick=function() { delete ps.verdicts[qi]; shown=false; updateResWrap(ps); rebuild(); };
        ctrl.appendChild(u);
      }
    }
    row.appendChild(ctrl); card.appendChild(row);
  }
  rebuild(); return card;
}

function makeCell(size, onDraw, verdict, allowClear, restoreData) {
  var wrap=document.createElement("div");
  wrap.style.cssText=`position:relative;width:${size}px;height:${size}px;display:inline-block;`;
  var cv=document.createElement("canvas"); cv.width=size*2; cv.height=size*2;
  var bc=verdict==="correct"?"#16a34a":verdict==="wrong"?"#dc2626":"#d4b896";
  cv.style.cssText=`position:absolute;inset:0;width:${size}px;height:${size}px;border:2.5px solid ${bc};border-radius:10px;cursor:crosshair;touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);`;
  var ov=document.createElement("canvas"); ov.width=size*2; ov.height=size*2;
  ov.style.cssText=`position:absolute;inset:0;width:${size}px;height:${size}px;border-radius:10px;pointer-events:none;`;
  var ctx=cv.getContext("2d"), oct=ov.getContext("2d");
  function grid(){
    var s=size*2;
    ctx.fillStyle="#fffef9"; ctx.fillRect(0,0,s,s);
    ctx.strokeStyle="#ddc9a8"; ctx.lineWidth=1; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(s/2,0); ctx.lineTo(s/2,s); ctx.moveTo(0,s/2); ctx.lineTo(s,s/2); ctx.stroke();
    ctx.setLineDash([]);
  }
  grid();
  if (restoreData) { var img = new Image(); img.onload = function() { ctx.drawImage(img, 0, 0, cv.width, cv.height); }; img.src = restoreData; }
  if (verdict) {
    var s=size*2;
    if (verdict==="correct") {
      oct.fillStyle="rgba(22,163,74,0.12)"; oct.fillRect(0,0,s,s);
      oct.strokeStyle="rgba(22,163,74,0.92)"; oct.lineWidth=18; oct.lineCap="round";
      oct.beginPath(); oct.arc(s/2,s/2,s*0.38,0,Math.PI*2); oct.stroke();
    } else {
      oct.fillStyle="rgba(220,38,38,0.10)"; oct.fillRect(0,0,s,s);
      oct.strokeStyle="rgba(220,38,38,0.92)"; oct.lineWidth=18; oct.lineCap="round";
      var m=s*0.18;
      oct.beginPath(); oct.moveTo(m,m); oct.lineTo(s-m,s-m); oct.moveTo(s-m,m); oct.lineTo(m,s-m); oct.stroke();
    }
  }
  var draw=false, last=null, hasDrawn=false;
  function pos(e){
    var r=cv.getBoundingClientRect(), sx=cv.width/r.width, sy=cv.height/r.height;
    var s=e.touches?e.touches[0]:e;
    return {x:(s.clientX-r.left)*sx, y:(s.clientY-r.top)*sy};
  }
  cv.addEventListener("mousedown",   function(e) {draw=true;last=pos(e);hasDrawn=true;});
  cv.addEventListener("mousemove",   function(e) {if(!draw)return;var p=pos(e);stroke(p);last=p;});
  cv.addEventListener("mouseup", function() {draw=false;if(hasDrawn&&onDraw)onDraw(cv.toDataURL());});
  cv.addEventListener("mouseleave", function() {draw=false;});
  cv.addEventListener("touchstart",  function(e) {e.preventDefault();draw=true;last=pos(e);hasDrawn=true;},{passive:false});
  cv.addEventListener("touchmove",   function(e) {e.preventDefault();if(!draw)return;var p=pos(e);var f=e.touches[0].force||0;stroke(p,f);last=p;},{passive:false});
  cv.addEventListener("touchend",    function(e) {e.preventDefault();draw=false;if(hasDrawn&&onDraw)onDraw(cv.toDataURL());},{passive:false});
  function stroke(p, force){
    var f = (force && force > 0) ? force : 0.5;
    var w = Math.max(8, f * 24 + 6);
    ctx.strokeStyle="#1c1c2e"; ctx.lineWidth=w;
    ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
  }
  if (allowClear) {
    var cb=document.createElement("button"); cb.textContent="✕";
    cb.style.cssText=`position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;border:none;background:#94a3b8;color:white;font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;`;
    cb.onclick=function(e) { e.stopPropagation(); ctx.clearRect(0,0,cv.width,cv.height); grid(); oct.clearRect(0,0,ov.width,ov.height); hasDrawn=false; if(onDraw) onDraw(null); };
    wrap.appendChild(cb);
  }
  wrap.appendChild(cv); wrap.appendChild(ov);
  return wrap;
}

function el(tag, cls) {
  var e=document.createElement(tag||"div");
  if(cls) e.className=cls;
  return e;
}
function parseSen(s){
  var m=s.match(/^(.*?)\{([^}]+)\}(.*)$/);
  return m?{before:m[1],kana:m[2],after:m[3]}:{before:s,kana:"",after:""};
}

function launchFireworks() {
  var canvas = document.createElement("canvas");
  canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;";
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  var ctx = canvas.getContext("2d");
  var particles = [];
  var colors = ["#fde68a","#fb923c","#f87171","#a78bfa","#34d399","#60a5fa","#f472b6"];
  for (var b = 0; b < 8; b++) {
    var bx = Math.random() * canvas.width;
    var by = Math.random() * canvas.height * 0.6;
    for (var p = 0; p < 40; p++) {
      var angle = (p / 40) * Math.PI * 2;
      var speed = 2 + Math.random() * 4;
      particles.push({
        x: bx, y: by,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        r: 3 + Math.random() * 3
      });
    }
  }
  var frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.018;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    frame++;
    if (frame < 80) requestAnimationFrame(draw);
    else { canvas.remove(); }
  }
  draw();
}
