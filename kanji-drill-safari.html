button, input { font-family: inherit; }

.back-btn {

}
.container { max-width:640px; margin:0 auto; padding:24px 16px; padding-bottom:40px; }

@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes popIn  { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes spin   { to{transform:rotate(360deg)} }
.slide-up { animation: slideUp 0.3s ease; }
.pop-in   { animation: popIn 0.3s ease; }

.card {
  background: white; border-radius: 18px; padding: 18px 20px;
  margin-bottom: 12px; box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  border: 2px solid #f0e6d3;
}
.btn-red {
  width:100%; padding:17px; border-radius:16px; border:none;
  background: linear-gradient(135deg,#c1121f,#780000);
  color:white; font-weight:900; font-size:17px; cursor:pointer;
  box-shadow: 0 4px 18px rgba(193,18,31,0.3);
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin-bottom:10px;

.btn-ghost {
  width:100%; padding:13px; border-radius:14px;
  border: 2px solid #f0e6d3; background:white;
  color:#78716c; font-weight:700; font-size:15px; cursor:pointer;
}
.session-row {
  background:white; border:2px solid #f0e6d3; border-radius:18px;
  padding:16px 20px; margin-bottom:12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.session-row:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(193,18,31,0.1); }
.level-btn {
  width:100%; background:white; border-radius:18px; padding:16px 20px;
  margin-bottom:12px; cursor:pointer; border:none;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
  transition:transform 0.15s, box-shadow 0.15s;

.q-card {
  background:white; border-radius:18px; padding:18px 20px 16px;
  margin-bottom:14px; box-shadow:0 2px 16px rgba(0,0,0,0.07);
  border:2px solid #f0e6d3; transition:border-color 0.3s;

.q-card.correct { border:2.5px solid #16a34a; }
.q-card.wrong   { border:2.5px solid #dc2626; }
.q-card.shown   { border:2px solid #f59e0b; }
.result-banner {
  background: linear-gradient(135deg,#1e1b4b,#312e81);
  border-radius:20px; padding:28px 24px; text-align:center;

canvas { touch-action: none; }

function save(sessions) {
  try { LS.setItem(SK, JSON.stringify(sessions)); } catch(e){}
}
function load() {
  try {
    var saved = JSON.parse(LS.getItem(SK)||"[]");
    var base = JSON.parse(JSON.stringify(BUILTIN));
    if (Array.isArray(saved)) {
      saved.forEach(s => {
        if (s && s.id && !base.find(b => b.id === s.id)) base.push(s);
      });
    }
    base.sort((a,b) => (a.id||0) - (b.id||0));
    return base.length > 0 ? base : JSON.parse(JSON.stringify(BUILTIN));
  } catch(e) {
    return JSON.parse(JSON.stringify(BUILTIN));
  }
}

var HK = "kanji_history_v1";

function loadHistory() {
  try { return JSON.parse(LS.getItem(HK)||"[]"); } catch { return []; }
}
function saveHistory(h) {
  try { LS.setItem(HK, JSON.stringify(h)); } catch(e){}
}
function addHistory(record) {
  var h = loadHistory();
  h.unshift(record);
  if (h.length > 200) h.splice(200);
  saveHistory(h);
}

function isClear(sessionTitle, levelTitle) {
  var h = loadHistory();
  return h.some(r =>
    r.sessionTitle === sessionTitle &&
    r.levelTitle === levelTitle &&
    r.correct / r.total >= 1.0
  );
}

var S = {
  screen: "home",
  sessions: load(),
  active: null,

  ps: null,
};

var app  = document.getElementById("app");
var hdr  = document.getElementById("header");

function go(screen) { S.screen = screen; render(); }

function render() {
  app.innerHTML = "";
  var hb = document.getElementById("hist-btn");
  if (hb) hb.style.display = (S.screen==="practice") ? "none" : "";
  var _bb = hdr.querySelector(".back-btn"); if (_bb) _bb.remove();
  if (S.screen !== "home") {
    var b = document.createElement("button");
    b.className = "back-btn"; b.textContent = "← もどる";
    b.onclick = () => {
      if (S.screen === "practice") { S.screen = "drill"; S.ps = null; }
      else if (S.screen === "drill") { S.screen = "kanji"; }
      else if (S.screen === "kanji") { S.screen = "home"; S.active = null; }
      else { S.screen = "home"; }
      render();
    };
    hdr.insertBefore(b, hdr.querySelector("h1"));
  }
  var pages = { home: pageHome, add: pageAdd, drill: pageDrill, kanji: pageKanji, practice: pagePractice, history: pageHistory };
  if (pages[S.screen]) pages[S.screen]();
}

        <button class="del" style="background:none;border:none;cursor:pointer;color:#d1d5db;font-size:20px;padding:6px 8px;border-radius:8px;flex-shrink:0;">🗑</button>`;

function pageAdd() {
  var div = el("div","slide-up");

  div.appendChild(h2);
  var info = el("div","card");
  info.style.marginBottom = "20px";
  info.innerHTML = `
    <div style="font-size:14px;font-weight:800;color:#92400e;margin-bottom:10px;">📋 使い方</div>
    <div style="font-size:13px;color:#374151;line-height:1.9;">
      このチャットで生成した<br>
      <b>「data-第〇回.json」</b>ファイルを選んでください。<br><br>
      <span style="color:#9ca3af;">iCloudドライブやAirDropで<br>iPadに転送したJSONファイルを選択できます。</span>
    </div>`;
  div.appendChild(info);
  var zone = el("div");
  zone.style.cssText = `border:3px dashed #f0e6d3;border-radius:20px;padding:44px 24px;

  zone.innerHTML = `
    <div style="font-size:48px;margin-bottom:12px;">📂</div>
    <div style="font-size:17px;font-weight:800;color:#1e1e1e;margin-bottom:6px;">JSONファイルを選ぶ</div>
    <div style="font-size:13px;color:#9ca3af;">タップしてファイルを選択</div>`;
  var fileInput = document.createElement("input");
  fileInput.type="file"; fileInput.accept=".json,application/json"; fileInput.style.display="none";
  fileInput.onchange = e => handleJSON(e.target.files[0]);
  div.appendChild(fileInput);
  zone.onmouseenter = () => { zone.style.borderColor="#c1121f"; zone.style.background="#fff8f0"; };
  zone.onmouseleave = () => { zone.style.borderColor="#f0e6d3"; zone.style.background="#fffef9"; };
  zone.onclick = () => fileInput.click();
  zone.ondragover = e => { e.preventDefault(); zone.style.borderColor="#c1121f"; };
  zone.ondragleave = () => zone.style.borderColor="#f0e6d3";
  zone.ondrop = e => { e.preventDefault(); handleJSON(e.dataTransfer.files[0]); };
  div.appendChild(zone);
  var cancelBtn = el("button","btn-ghost");
  cancelBtn.textContent = "← もどる";
  cancelBtn.onclick = () => go("home");
  div.appendChild(cancelBtn);

  function handleJSON(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = () => {
      try {
        var data = JSON.parse(reader.result);
        if (!data.title || !data.levels || !Array.isArray(data.levels)) throw new Error("形式が正しくありません");
        if (!data.id) data.id = Date.now();
        var exists = S.sessions.find(s => s.id === data.id || s.title === data.title);
        if (exists) {
          zone.innerHTML = `<div style="text-align:center;padding:10px;">
            <div style="font-size:16px;font-weight:800;margin-bottom:12px;">「${data.title}」は既に保存されています。</div>
            <div style="display:flex;gap:10px;justify-content:center;">
              <button id="overwrite-yes" style="padding:10px 22px;border-radius:12px;border:none;background:#c1121f;color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;">上書きする</button>
              <button id="overwrite-no" style="padding:10px 22px;border-radius:12px;border:1.5px solid #d1d5db;background:white;color:#374151;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;">キャンセル</button>
            </div></div>`;
          document.getElementById('overwrite-yes').onclick = () => { S.sessions = S.sessions.filter(s => s.id !== exists.id); S.sessions = [data, ...S.sessions]; save(S.sessions); finishImport(data); };
          document.getElementById('overwrite-no').onclick = () => { S.screen='home'; render(); };
          return;
        }
        S.sessions = [data, ...S.sessions];
        save(S.sessions);
        finishImport(data);
      } catch(e) {
        zone.innerHTML = `<div style="color:#dc2626;text-align:center;"><div style="font-size:32px;margin-bottom:10px;">❌</div><div style="font-size:14px;font-weight:800;">${e.message}</div></div>`;
        zone.style.borderColor = "#dc2626";
      }
    };
    reader.readAsText(file);
  }
  function finishImport(data) {
    zone.innerHTML = `<div class="pop-in" style="color:#16a34a;text-align:center;"><div style="font-size:42px;margin-bottom:10px;">✅</div><div style="font-size:16px;font-weight:900;margin-bottom:4px;">「${data.title}」を追加しました！</div><div style="font-size:13px;color:#166534;">${data.kanjiList||""}</div></div>`;
    zone.style.borderColor = "#16a34a"; zone.style.background = "#f0fdf4";
    setTimeout(() => { S.active=data; S.screen="kanji"; render(); }, 1200);
  }
  app.appendChild(div);
}

function makePracticeState(questions) {
  return { questions, verdicts: {}, done: false };
}

function pagePractice() {
  var ps = S.ps;
  var lc = S.level !== "summary" ? LC[S.level-1] : null;
  var title = lc ? `${lc.emoji} ${lc.title}` : "🏆 まとめテスト（全レベル）";
  var div = el("div","slide-up");
  var bar = el("div");
  bar.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;";
  var h2 = el("div"); h2.style.cssText = "font-size:17px;color:#c1121f;font-weight:900;"; h2.textContent = title;
  var badge = el("span"); badge.id="pbadge";
  badge.style.cssText = "background:#f0e6d3;border-radius:20px;padding:4px 12px;font-size:12px;color:#92400e;font-weight:700;";
  badge.textContent = `0/${ps.questions.length} 採点済`;
  bar.appendChild(h2); bar.appendChild(badge);
  div.appendChild(bar);

  if (!ps.done) {
    ps.questions.forEach((q,qi) => div.appendChild(buildQCard(q,qi,ps)));
    var wrap = el("div"); wrap.id="res-wrap";
    div.appendChild(wrap);
    updateResWrap(ps);
  } else {
    ps.questions.forEach((q,qi) => {
      var {before,kana,after} = parseSen(q.sentence);
      var v = ps.verdicts[qi];
      var row = el("div");
      row.style.cssText = `background:white;border-radius:14px;padding:14px 18px;margin-bottom:10px;border:2px solid ${v==="correct"?"#16a34a":"#dc2626"};display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,0.06);`;
      row.innerHTML = `<div><div style="font-size:12px;color:#9ca3af;margin-bottom:2px;">第${qi+1}問</div><div style="font-size:16px;color:#1e1e1e;font-weight:500;">${before}<span style="color:#c1121f;font-weight:800;">${kana}</span>${after}</div><div style="font-size:13px;color:#78716c;margin-top:2px;">こたえ：<b>${q.answer}</b></div></div><div style="font-size:28px;">${v==="correct"?"⭕":"✕"}</div>`;
      div.appendChild(row);
    });

    var correct = Object.values(ps.verdicts).filter(v=>v==="correct").length;
    var total   = ps.questions.length;
    var msg = correct===total ? "🌟 かんぺき！すごい！" : correct>=total*0.7 ? "⭐ よくできました！" : correct>=total*0.4 ? "💪 もう少し！がんばれ！" : "📖 また れんしゅう しよう！";
    var isClearedNow = S.level !== "summary" && correct === total;
    var allLevelsCleared = (function() {
      if (S.level === "summary") return false;
      var sess = S.active;
      if (!sess) return false;
      var cleared = true;
      LC.forEach(function(lc) {
        if (!isClear(sess.title, lc.title)) cleared = false;
      });
      return cleared;
    })();
    var lc2 = S.level !== "summary" ? LC[S.level-1] : null;

    var banner = el("div","result-banner pop-in"); banner.style.marginTop="8px";
    banner.innerHTML = `
      <div style="color:#a5b4fc;font-size:13px;letter-spacing:2px;margin-bottom:8px;">さいてん けっか</div>
      <div style="color:white;font-size:50px;font-weight:900;line-height:1;">${correct}<span style="font-size:20px;color:#a5b4fc;font-weight:400;"> / ${total}もん</span></div>
      <div style="font-size:24px;margin-top:12px;">${msg}</div>
      ${isClearedNow ? `<div style="margin-top:16px;background:rgba(255,255,255,0.15);border-radius:14px;padding:14px 20px;"><div style="font-size:28px;margin-bottom:4px;">🎉</div><div style="font-size:22px;font-weight:900;color:#fde68a;letter-spacing:2px;">レベルクリア！</div><div style="font-size:13px;color:#a5b4fc;margin-top:4px;">${lc2 ? lc2.title : ""} をクリアしました</div></div>` : ""}
      ${allLevelsCleared ? `<div style="margin-top:16px;background:linear-gradient(135deg,#fde68a,#fbbf24);border-radius:18px;padding:20px;text-align:center;"><div style="font-size:48px;margin-bottom:8px;">🏆</div><div style="font-size:26px;font-weight:900;color:#92400e;letter-spacing:2px;">ぜんぶクリア！！</div><div style="font-size:15px;color:#78350f;margin-top:6px;font-weight:700;">すべてのレベルをせいふくしたよ！</div></div>` : ""}`;
    div.appendChild(banner);
    if (allLevelsCleared) { setTimeout(launchFireworks, 300); }

    var resetBtn = el("button","btn-ghost"); resetBtn.style.marginTop="10px"; resetBtn.textContent = "🔄 もう一度やる";
    resetBtn.onclick = () => { S.ps = makePracticeState(ps.questions); render(); };
    div.appendChild(resetBtn);
  }

  app.innerHTML = ""; app.appendChild(div);
}

function updateResWrap(ps) {
  var wrap = document.getElementById("res-wrap"); if (!wrap) return;
  var badge = document.getElementById("pbadge");
  var g = Object.keys(ps.verdicts).length;
  if (badge) badge.textContent = `${g}/${ps.questions.length} 採点済`;
  wrap.innerHTML = "";
  if (g === ps.questions.length) {
    var btn = el("button","btn-red"); btn.style.marginTop="4px"; btn.innerHTML = "🏆 けっか を みる";
    btn.onclick = () => {
      ps.done = true;
      var correct = Object.values(ps.verdicts).filter(v=>v==="correct").length;
      var wrongs = ps.questions.filter((_,qi) => ps.verdicts[qi]==="wrong").map(q => ({ sentence: q.sentence, answer: q.answer }));
      var lc = S.level !== "summary" ? LC[S.level-1] : null;
      addHistory({ date: new Date().toISOString(), sessionTitle: (S.active ? S.active.title : ""), levelTitle: lc ? lc.title : "まとめテスト", total: ps.questions.length, correct, wrongs });
      pagePractice();
    };
    wrap.appendChild(btn);
  }
}

  var history = loadHistory();

  if (history.length === 0) {
    var empty = el("div"); empty.style.cssText = "text-align:center;padding:48px 20px;";

  var allWrongs = {};

  if (wrongEntries.length > 0) {
    var wCard = el("div","card"); wCard.style.marginBottom = "20px";
    wCard.innerHTML = `<div style="font-size:14px;font-weight:800;color:#dc2626;margin-bottom:12px;">❌ 苦手な漢字</div>`;
    var wGrid = el("div"); wGrid.style.cssText = "display:flex;flex-wrap:wrap;gap:8px;";
    wrongEntries.slice(0,20).forEach(([kanji, count]) => {
      var chip = el("div");
      chip.style.cssText = `background:#fff0f0;border:2px solid #fecaca;border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:6px;`;
      chip.innerHTML = `<span style="font-size:18px;font-weight:900;color:#1e1e1e;">${kanji}</span><span style="font-size:11px;color:#dc2626;font-weight:700;">${count}回ミス</span>`;

    wCard.appendChild(wGrid); div.appendChild(wCard);

  div.appendChild(listLabel);

  history.forEach(r => {
    var d = new Date(r.date);
    var dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    var timeStr = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    var pct = Math.round(r.correct/r.total*100);
    var color = pct===100?"#16a34a":pct>=70?"#3b82f6":pct>=40?"#f59e0b":"#dc2626";
    var row = el("div");
    row.style.cssText = `background:white;border:2px solid #f0e6d3;border-radius:16px;padding:14px 18px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,0.05);`;
    row.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div><span style="font-size:14px;font-weight:800;color:#1e1b4b;">${r.sessionTitle}</span><span style="font-size:12px;color:#9ca3af;margin-left:8px;">${r.levelTitle}</span></div>
        <div style="font-size:22px;font-weight:900;color:${color};">${r.correct}<span style="font-size:13px;color:#9ca3af;font-weight:400;">/${r.total}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="flex:1;height:6px;background:#f0e6d3;border-radius:3px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width 0.5s;"></div></div>
        <div style="font-size:11px;color:#9ca3af;white-space:nowrap;">${dateStr} ${timeStr}</div>
      </div>
      ${r.wrongs && r.wrongs.length>0 ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0e6d3;"><span style="font-size:11px;color:#dc2626;font-weight:700;">ミス：</span>${r.wrongs.map(w=>`<span style="font-size:13px;font-weight:800;color:#1e1e1e;margin-right:6px;">${w.answer}</span>`).join("")}</div>` : ""}`;
    div.appendChild(row);
  });

  var clearWrap = el("div"); clearWrap.style.cssText = "margin-top:8px;";
  var clearBtn = el("button","btn-ghost"); clearBtn.textContent = "🗑 履歴をすべて削除";

    clearWrap.innerHTML = "";
    var confirm_div = el("div");
    confirm_div.style.cssText = `background:#fff0f0;border:2px solid #fecaca;border-radius:14px;padding:16px;text-align:center;`;
    confirm_div.innerHTML = `<div style="font-size:14px;font-weight:700;color:#dc2626;margin-bottom:12px;">本当に全件削除しますか？</div>`;
    var yesBtn = el("button"); yesBtn.textContent = "はい、削除する";
    yesBtn.style.cssText = `background:#dc2626;color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:800;font-size:14px;cursor:pointer;margin-right:8px;font-family:inherit;`;
    yesBtn.onclick = () => { saveHistory([]); render(); };
    var noBtn = el("button"); noBtn.textContent = "キャンセル";
    noBtn.style.cssText = `background:white;color:#6b7280;border:2px solid #e5e7eb;border-radius:10px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;`;
    noBtn.onclick = () => { clearWrap.innerHTML=""; clearWrap.appendChild(clearBtn); };
    confirm_div.appendChild(yesBtn); confirm_div.appendChild(noBtn); clearWrap.appendChild(confirm_div);

  clearWrap.appendChild(clearBtn); div.appendChild(clearWrap); app.appendChild(div);
}

function buildQCard(q, qi, ps) {
  var {before,kana,after} = parseSen(q.sentence);
  var chars = q.answer.split("");
  var shown = !!ps.verdicts[qi];
  var drawn = {};
  var card = el("div","q-card");
  if (ps.verdicts[qi]==="correct") card.classList.add("correct");
  else if (ps.verdicts[qi]==="wrong") card.classList.add("wrong");

  function rebuild() {
    card.className = "q-card" + (ps.verdicts[qi]==="correct"?" correct":ps.verdicts[qi]==="wrong"?" wrong":shown?" shown":"");
    card.innerHTML = "";
    var top = el("div"); top.style.cssText = "display:flex;align-items:baseline;gap:8px;margin-bottom:12px;";
    top.innerHTML = `<span style="font-size:11px;font-weight:800;color:white;background:#c1121f;border-radius:20px;padding:2px 9px;flex-shrink:0;">第${qi+1}問</span><div style="font-size:18px;color:#1e1e1e;line-height:1.9;font-weight:500;">${before}<span style="color:#c1121f;font-weight:800;background:#fff0f0;border-radius:5px;padding:1px 5px;margin:0 1px;">${kana}</span>${after}</div>`;
    card.appendChild(top);
    var row = el("div"); row.style.cssText = "display:flex;align-items:center;gap:14px;flex-wrap:wrap;";
    var cellGroup = el("div"); cellGroup.style.cssText = "display:flex;gap:10px;flex-wrap:wrap;align-items:center;";
    chars.forEach((_,ci) => {
      var cell = makeCell(200, d => { drawn[ci]=d; }, ps.verdicts[qi]||null, !shown && !ps.verdicts[qi], drawn[ci]);
      cellGroup.appendChild(cell);
    });
    row.appendChild(cellGroup);
    var ctrl = el("div"); ctrl.style.cssText = "display:flex;flex-direction:column;gap:8px;align-items:stretch;min-width:80px;";
    if (!shown) {
      var ab = el("button"); ab.id=`ab${qi}`;
      ab.style.cssText=`padding:12px 16px;border-radius:14px;border:none;background:linear-gradient(135deg,#c1121f,#780000);color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;`;
      ab.textContent="📖 こたえをみる"; ab.onclick=()=>{ shown=true; rebuild(); };
      ctrl.appendChild(ab);
    } else {
      var aw = el("div","pop-in"); aw.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:4px;";
      var ar = el("div"); ar.style.cssText="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;";
      chars.forEach(c => {
        var b = el("div");
        b.style.cssText=`width:44px;height:44px;border:2px solid #d4b896;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;background:#fffef5;`;
        b.textContent=c; ar.appendChild(b);
      });
      var lbl=el("div"); lbl.style.cssText="font-size:10px;color:#92400e;font-weight:700;"; lbl.textContent="こたえ";
      aw.appendChild(ar); aw.appendChild(lbl); ctrl.appendChild(aw);
      if (!ps.verdicts[qi]) {
        var btns=el("div","pop-in"); btns.style.cssText="display:flex;gap:6px;justify-content:center;";
        var ok=el("button"); ok.textContent="⭕";
        ok.style.cssText=`width:52px;height:52px;border-radius:14px;border:2.5px solid #16a34a;background:white;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;`;
        ok.onmouseenter=()=>ok.style.background="#dcfce7"; ok.onmouseleave=()=>ok.style.background="white";
        ok.onclick=()=>{ ps.verdicts[qi]="correct"; updateResWrap(ps); shown=true; rebuild(); };
        var ng=el("button"); ng.textContent="✕";
        ng.style.cssText=`width:52px;height:52px;border-radius:14px;border:2.5px solid #dc2626;background:white;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;`;
        ng.onmouseenter=()=>ng.style.background="#fee2e2"; ng.onmouseleave=()=>ng.style.background="white";
        ng.onclick=()=>{ ps.verdicts[qi]="wrong"; updateResWrap(ps); shown=true; rebuild(); };
        btns.appendChild(ok); btns.appendChild(ng); ctrl.appendChild(btns);
      }
      if (ps.verdicts[qi]) {
        var u=el("button"); u.textContent="やり直し";
        u.style.cssText=`padding:8px 10px;border-radius:10px;border:1.5px solid #d1d5db;background:white;color:#6b7280;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;`;
        u.onclick=()=>{ delete ps.verdicts[qi]; shown=false; updateResWrap(ps); rebuild(); };
        ctrl.appendChild(u);
      }
    }
    row.appendChild(ctrl); card.appendChild(row);
  }
  rebuild(); return card;
}

function makeCell(size, onDraw, verdict, allowClear, restoreData) {
  var wrap=document.createElement("div");
  wrap.style.cssText=`position:relative;width:${size}px;height:${size}px;display:inline-block;`;
  var cv=document.createElement("canvas"); cv.width=size*2; cv.height=size*2;
  var bc=verdict==="correct"?"#16a34a":verdict==="wrong"?"#dc2626":"#d4b896";
  cv.style.cssText=`position:absolute;inset:0;width:${size}px;height:${size}px;border:2.5px solid ${bc};border-radius:10px;cursor:crosshair;touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);`;
  var ov=document.createElement("canvas"); ov.width=size*2; ov.height=size*2;
  ov.style.cssText=`position:absolute;inset:0;width:${size}px;height:${size}px;border-radius:10px;pointer-events:none;`;
  var ctx=cv.getContext("2d"), oct=ov.getContext("2d");
  function grid(){
    var s=size*2;
    ctx.fillStyle="#fffef9"; ctx.fillRect(0,0,s,s);
    ctx.strokeStyle="#ddc9a8"; ctx.lineWidth=1; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(s/2,0); ctx.lineTo(s/2,s); ctx.moveTo(0,s/2); ctx.lineTo(s,s/2); ctx.stroke();
    ctx.setLineDash([]);
  }
  grid();
  if (restoreData) { var img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, cv.width, cv.height); img.src = restoreData; }
  if (verdict) {
    var s=size*2;
    if (verdict==="correct") {
      oct.fillStyle="rgba(22,163,74,0.12)"; oct.fillRect(0,0,s,s);
      oct.strokeStyle="rgba(22,163,74,0.92)"; oct.lineWidth=18; oct.lineCap="round";
      oct.beginPath(); oct.arc(s/2,s/2,s*0.38,0,Math.PI*2); oct.stroke();
    } else {
      oct.fillStyle="rgba(220,38,38,0.10)"; oct.fillRect(0,0,s,s);
      oct.strokeStyle="rgba(220,38,38,0.92)"; oct.lineWidth=18; oct.lineCap="round";
      var m=s*0.18;
      oct.beginPath(); oct.moveTo(m,m); oct.lineTo(s-m,s-m); oct.moveTo(s-m,m); oct.lineTo(m,s-m); oct.stroke();
    }
  }
  var draw=false, last=null, hasDrawn=false;
  function pos(e){
    var r=cv.getBoundingClientRect(), sx=cv.width/r.width, sy=cv.height/r.height;
    var s=e.touches?e.touches[0]:e;
    return {x:(s.clientX-r.left)*sx, y:(s.clientY-r.top)*sy};
  }
  cv.addEventListener("mousedown",   e=>{draw=true;last=pos(e);hasDrawn=true;});
  cv.addEventListener("mousemove",   e=>{if(!draw)return;var p=pos(e);stroke(p);last=p;});
  cv.addEventListener("mouseup",     ()=>{draw=false;if(hasDrawn&&onDraw)onDraw(cv.toDataURL());});
  cv.addEventListener("mouseleave",  ()=>{draw=false;});
  cv.addEventListener("touchstart",  e=>{e.preventDefault();draw=true;last=pos(e);hasDrawn=true;},{passive:false});
  cv.addEventListener("touchmove",   e=>{e.preventDefault();if(!draw)return;var p=pos(e);var f=e.touches[0].force||0;stroke(p,f);last=p;},{passive:false});
  cv.addEventListener("touchend",    e=>{e.preventDefault();draw=false;if(hasDrawn&&onDraw)onDraw(cv.toDataURL());},{passive:false});
  function stroke(p, force){
    var f = (force && force > 0) ? force : 0.5;
    var w = Math.max(8, f * 24 + 6);
    ctx.strokeStyle="#1c1c2e"; ctx.lineWidth=w;
    ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
  }
  if (allowClear) {
    var cb=document.createElement("button"); cb.textContent="✕";
    cb.style.cssText=`position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;border:none;background:#94a3b8;color:white;font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;`;
    cb.onclick=e=>{ e.stopPropagation(); ctx.clearRect(0,0,cv.width,cv.height); grid(); oct.clearRect(0,0,ov.width,ov.height); hasDrawn=false; if(onDraw) onDraw(null); };
    wrap.appendChild(cb);
  }
  wrap.appendChild(cv); wrap.appendChild(ov);
  return wrap;
}

function el(tag, cls) {
  var e=document.createElement(tag||"div");
  if(cls) e.className=cls;
  return e;
}
function parseSen(s){
  var m=s.match(/^(.*?)\{([^}]+)\}(.*)$/);
  return m?{before:m[1],kana:m[2],after:m[3]}:{before:s,kana:"",after:""};
}

render();

function launchFireworks() {
  var canvas = document.createElement("canvas");
  canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;";
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  var ctx = canvas.getContext("2d");
  var particles = [];
  var colors = ["#fde68a","#fb923c","#f87171","#a78bfa","#34d399","#60a5fa","#f472b6"];
  for (var b = 0; b < 8; b++) {
    var bx = Math.random() * canvas.width;
    var by = Math.random() * canvas.height * 0.6;
    for (var p = 0; p < 40; p++) {
      var angle = (p / 40) * Math.PI * 2;
      var speed = 2 + Math.random() * 4;
      particles.push({
        x: bx, y: by,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        r: 3 + Math.random() * 3
      });
    }
  }
  var frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.018;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    frame++;
    if (frame < 80) requestAnimationFrame(draw);
    else { canvas.remove(); }
  }
  draw();
}
